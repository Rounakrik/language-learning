<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguistFlow | Master French & German</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">LinguistFlow</div>
        <div class="stats">🔥 Streak: <span id="streak">0</span></div>
    </nav>

    <main id="app">
        <section id="hero">
            <h1>Fluency in 90 Days.</h1>
            <p>Select your path to begin the immersion.</p>
            <div class="lang-buttons">
                <button onclick="startLesson('french')">🇫🇷 Learn French</button>
                <button onclick="startLesson('german')">🇩🇪 Learn German</button>
            </div>
        </section>

        <section id="flashcard-container" class="hidden">
            <div class="card">
                <h2 id="word-to-learn">Bonjour</h2>
                <p id="phonetic">/bɔ̃.ʒuʁ/</p>
                <input type="text" id="user-input" placeholder="Type the meaning...">
                <button onclick="checkAnswer()">Check</button>
                <p id="feedback"></p>
            </div>
        </main>
    </main>

    <script src="script.js"></script>
</body>
</html>
